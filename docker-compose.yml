version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  message-broker-kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://message-broker-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  auth-gate-provider:
    image: python:3.9-slim
    command: ["python", "-u", "/app/app.py"]
    volumes:
      - ./services/auth-gate:/app

  hello-string-factory:
    image: python:3.9-slim
    command: ["python", "-u", "/app/app.py"]
    volumes:
      - ./services/hello-factory:/app

  world-data-aggregator:
    image: python:3.9-slim
    command: ["python", "-u", "/app/app.py"]
    volumes:
      - ./services/world-data-aggregator:/app

  punctuation-relational-db:
    image: postgres:15
    environment:
      POSTGRES_DB: punctuation_db
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password_too_weak_for_enterprise}
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d

  orchestrator-brain:
    image: python:3.9-slim
    depends_on:
      - auth-gate-provider
      - hello-string-factory
      - world-data-aggregator
      - punctuation-relational-db
    environment:
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-password_too_weak_for_enterprise}
    command: ["sh", "-c", "pip install requests psycopg2-binary && python -u /app/app.py"]
    volumes:
      - ./services/orchestrator:/app

  cache-layer-redis:
    image: redis:alpine

  logging-sidecar-service:
    image: alpine:latest
    command: ["sh", "-c", "while true; do echo \"[LOGGER] $$(date) - Simulando ingestão de 1GB de telemetria no ElasticSearch...\"; sleep 2; done"]

  metaverse-compliance-checker:
    image: alpine:latest
    command: ["sh", "-c", "while true; do echo \"[NODE-JS] $$(date) - Validando conformidade com Avatar 3D... OK\"; sleep 10; done"]

networks:
  default:
    name: enterprise-synergy-mesh
